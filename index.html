    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Montserrat', sans-serif; }
      ::selection { background-color: #ccff00; color: #001F3F; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #001F3F; }
      ::-webkit-scrollbar-thumb { background: #ccff00; border-radius: 4px; }
      .fade-in { animation: fadeIn 0.5s ease-in; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .slide-in-right { animation: slideInRight 0.3s ease-out; }
      @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
      .slide-in-left { animation: slideInLeft 0.3s ease-out; }
      @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
      .hover-scale { transition: transform 0.3s ease, box-shadow 0.3s ease; }
      .hover-scale:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,31,63,0.15); }
      .img-zoom { overflow: hidden; }
      .img-zoom img { transition: transform 0.5s ease; }
      .img-zoom:hover img { transform: scale(1.05); }

      /* Scroll reveal */
      .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
      .reveal.visible { opacity: 1; transform: translateY(0); }

      /* Parallax background */
      .parallax-bg { background-attachment: fixed; background-position: center; background-repeat: no-repeat; background-size: cover; }

      /* Gradient overlays */
      .gradient-overlay { position: relative; }
      .gradient-overlay::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,31,63,0.9) 0%, rgba(0,31,63,0.4) 100%); }

      /* Product card enhanced hover */
      .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
      .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,31,63,0.2); }
      .product-card .card-img { transition: transform 0.6s ease; }
      .product-card:hover .card-img { transform: scale(1.08); }
      .product-card .card-overlay { opacity: 0; transition: opacity 0.3s ease; }
      .product-card:hover .card-overlay { opacity: 1; }

      /* Stagger animation */
      .stagger-1 { animation-delay: 0.1s; }
      .stagger-2 { animation-delay: 0.2s; }
      .stagger-3 { animation-delay: 0.3s; }
      .stagger-4 { animation-delay: 0.4s; }

      /* Pulse glow for CTA */
      .pulse-glow { animation: pulseGlow 2s infinite; }
      @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(204,255,0,0.4); } 50% { box-shadow: 0 0 20px 10px rgba(204,255,0,0.1); } }

      /* Marquee for announcements */
      .marquee { animation: marquee 30s linear infinite; }
      @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

      /* Number counter animation */
      .count-up { animation: countUp 1s ease-out forwards; }

      /* Text gradient */
      .text-gradient { background: linear-gradient(90deg, #ccff00, #B8E934, #ccff00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: shimmer 3s linear infinite; }
      @keyframes shimmer { to { background-position: 200% center; } }

      /* Floating animation */
      .float { animation: float 3s ease-in-out infinite; }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

      /* Hero text stagger entrance */
      .hero-enter { opacity: 0; transform: translateY(30px); animation: heroEnter 0.8s ease-out forwards; }
      @keyframes heroEnter { to { opacity: 1; transform: translateY(0); } }
      .hero-enter-1 { animation-delay: 0.1s; }
      .hero-enter-2 { animation-delay: 0.3s; }
      .hero-enter-3 { animation-delay: 0.5s; }
      .hero-enter-4 { animation-delay: 0.7s; }

      /* Gallery hover */
      .gallery-item { position: relative; overflow: hidden; }
      .gallery-item img { transition: transform 0.6s ease; }
      .gallery-item:hover img { transform: scale(1.1); }
      .gallery-item .gallery-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,31,63,0.8) 0%, transparent 60%); opacity: 0; transition: opacity 0.3s ease; }
      .gallery-item:hover .gallery-overlay { opacity: 1; }
